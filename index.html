<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; cursor: pointer; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr:hover { background-color: #f1f1f1; }
    .form-section { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
    input { margin-right: 10px; padding: 5px; }
    button { padding: 5px 15px; background: #28a745; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <div class="form-section">
    <input type="text" id="input-name" placeholder="Tên sản phẩm">
    <input type="text" id="input-category" placeholder="Danh mục">
    <input type="number" id="input-price" placeholder="Đơn giá">
    <input type="number" id="input-quantity" placeholder="Số lượng">
    <button id="btn-add">Thêm</button>
  </div>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="header-name">Tên sản phẩm <span id="sort-icon"></span></th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let products = [];
    let isAsc = true;

    // 4.1 Nạp dữ liệu qua AJAX
    function loadData() {
      const xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          products = JSON.parse(xhr.responseText);
          renderTable(products);
        }
      };
      xhr.open('GET', 'products.json', true);
      xhr.send();
    }

    function renderTable(data) {
      const tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = '';
      data.forEach((item, index) => {
        const row = `<tr>
          <td>${index + 1}</td>
          <td>${item.name}</td>
          <td>${item.category}</td>
          <td>${item.price}</td>
          <td>${item.quantity}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    // 4.2 Sắp xếp bảng
    document.getElementById('header-name').addEventListener('click', () => {
      products.sort((a, b) => {
        const nameA = a.name.toLowerCase();
        const nameB = b.name.toLowerCase();
        return isAsc ? nameA.localeCompare(nameB) : nameB.localeCompare(nameA);
      });
      
      const icon = document.getElementById('sort-icon');
      icon.innerHTML = isAsc ? ' ▲' : ' ▼';
      isAsc = !isAsc;
      renderTable(products);
    });

    // 4.3 Thêm sản phẩm
    document.getElementById('btn-add').addEventListener('click', () => {
      const name = document.getElementById('input-name').value;
      const category = document.getElementById('input-category').value;
      const price = document.getElementById('input-price').value;
      const quantity = document.getElementById('input-quantity').value;

      if (name.length >= 3 && price > 0 && quantity >= 1) {
        const newProduct = {
          id: products.length + 1,
          name: name,
          category: category,
          price: parseInt(price),
          quantity: parseInt(quantity)
        };
        products.push(newProduct);
        renderTable(products);
        
        // Reset form
        document.getElementById('input-name').value = '';
        document.getElementById('input-category').value = '';
        document.getElementById('input-price').value = '';
        document.getElementById('input-quantity').value = '';
      }
    });

    window.onload = loadData;
  </script>
</body>
</html>
