<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; cursor: pointer; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>
    <h2>Thêm sản phẩm</h2>
    <div>
        <input type="text" id="input-name" placeholder="Tên sản phẩm">
        <input type="text" id="input-category" placeholder="Danh mục">
        <input type="number" id="input-price" placeholder="Đơn giá">
        <input type="number" id="input-quantity" placeholder="Số lượng">
        <button id="btn-add">Thêm</button>
    </div>

    <h2>Danh sách sản phẩm</h2>
    <table id="product-table">
        <thead>
            <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Danh mục</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        var products = [];
        var sortAsc = true;

        function renderTable() {
            var tbody = document.querySelector('#product-table tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>' + (i + 1) + '</td>' +
                               '<td>' + p.name + '</td>' +
                               '<td>' + (p.category || '') + '</td>' +
                               '<td>' + p.price + '</td>' +
                               '<td>' + p.quantity + '</td>';
                tbody.appendChild(tr);
            }
        }

        function loadProducts() {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    products = JSON.parse(xhr.responseText);
                    renderTable();
                }
            };
            xhr.open('GET', 'products.json');
            xhr.send();
        }

        // Add Product
        document.getElementById('btn-add').addEventListener('click', function(e) {
            if (e) e.preventDefault();
            var name = document.getElementById('input-name').value.trim();
            var category = document.getElementById('input-category').value.trim();
            var price = parseFloat(document.getElementById('input-price').value);
            var quantity = parseInt(document.getElementById('input-quantity').value);

            if (name.length >= 3 && price > 0 && quantity >= 1) {
                products.push({ name: name, category: category, price: price, quantity: quantity });
                renderTable();
                // Reset fields
                document.getElementById('input-name').value = '';
                document.getElementById('input-category').value = '';
                document.getElementById('input-price').value = '';
                document.getElementById('input-quantity').value = '';
            }
        });

        // Sort by finding the "Tên sản phẩm" header
        var headers = document.querySelectorAll('#product-table th');
        var nameHeader = null;
        for (var i = 0; i < headers.length; i++) {
            var text = (headers[i].textContent || '').toLowerCase();
            if (text.indexOf('tên') !== -1 || text.indexOf('ten') !== -1 || text.indexOf('name') !== -1) {
                nameHeader = headers[i];
                break;
            }
        }

        if (nameHeader) {
            nameHeader.addEventListener('click', function() {
                products.sort(function(a, b) {
                    var nA = a.name.toLowerCase();
                    var nB = b.name.toLowerCase();
                    if (nA < nB) return sortAsc ? -1 : 1;
                    if (nA > nB) return sortAsc ? 1 : -1;
                    return 0;
                });
                var symbol = sortAsc ? ' ▲' : ' ▼';
                nameHeader.textContent = 'Tên sản phẩm' + symbol;
                sortAsc = !sortAsc;
                renderTable();
            });
        }

        // Initial call
        loadProducts();
    </script>
</body>
</html>
